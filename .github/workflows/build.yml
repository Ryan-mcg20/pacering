name: Build PaceRing APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev build-essential

    - name: Install Python dependencies
      run: |
        pip install buildozer cython virtualenv

    - name: Set up full Android SDK
      run: |
        SDK=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK/cmdline-tools $SDK/tools/bin $SDK/licenses
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip -d ct
        mv ct/cmdline-tools $SDK/cmdline-tools/latest
        yes | $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK --licenses 2>/dev/null || true
        $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK \
          "platform-tools" \
          "build-tools;33.0.0" \
          "platforms;android-33"
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $SDK/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $SDK/licenses/android-sdk-preview-license

    - name: Patch buildozer to skip sdkmanager check
      run: |
        BPATH=$(python -c "import buildozer; import os; print(os.path.dirname(buildozer.__file__))")
        TARGETS=$BPATH/targets/android.py
        SDK=$HOME/.buildozer/android/platform/android-sdk
        # Replace the sdkmanager path buildozer uses
        sed -i "s|tools/bin/sdkmanager|cmdline-tools/latest/bin/sdkmanager|g" $TARGETS
        echo "Patched buildozer android target"
        grep "sdkmanager" $TARGETS | head -5

    - name: Build APK
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PaceRing-debug
        path: bin/*.apk
