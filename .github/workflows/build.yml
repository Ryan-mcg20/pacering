name: Build PaceRing APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Set up Java 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake libffi-dev \
          libssl-dev build-essential

    - name: Install Python dependencies
      run: pip install buildozer cython==0.29.33

    - name: Install Android SDK tools
      run: |
        SDK=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK/cmdline-tools $SDK/tools/bin $SDK/licenses
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mkdir -p $SDK/cmdline-tools/latest
        mv cmdline-tools/* $SDK/cmdline-tools/latest/
        ln -sf $SDK/cmdline-tools/latest/bin/sdkmanager $SDK/tools/bin/sdkmanager
        yes | $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK --licenses 2>/dev/null || true
        $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK \
          "platform-tools" \
          "build-tools;33.0.2" \
          "platforms;android-33"
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $SDK/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $SDK/licenses/android-sdk-preview-license

    - name: Build APK
      run: buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PaceRing-debug
        path: bin/*.apk
