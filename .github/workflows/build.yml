name: Build PaceRing APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev build-essential
        pip install buildozer==1.5.0 cython==0.29.33 virtualenv

    - name: Set up Android SDK
      run: |
        SDK=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK/tools/bin $SDK/licenses
        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip -d ct
        mkdir -p $SDK/cmdline-tools/latest
        mv ct/cmdline-tools/* $SDK/cmdline-tools/latest/
        yes | $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK --licenses 2>/dev/null || true
        $SDK/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK "platform-tools" "build-tools;33.0.0" "platforms;android-33"
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $SDK/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $SDK/licenses/android-sdk-preview-license
        ln -sf $SDK/cmdline-tools/latest/bin/sdkmanager $SDK/tools/bin/sdkmanager

    - name: Patch buildozer sdkmanager path
      run: |
        BPATH=$(python -c "import buildozer; import os; print(os.path.dirname(buildozer.__file__))")
        echo "Buildozer path: $BPATH"
        grep -n "sdkmanager" $BPATH/targets/android.py | head -20
        sed -i 's|tools/bin/sdkmanager|cmdline-tools/latest/bin/sdkmanager|g' $BPATH/targets/android.py
        echo "--- After patch ---"
        grep -n "sdkmanager" $BPATH/targets/android.py | head -20

    - name: Build APK
      run: |
        buildozer -v android debug 2>&1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PaceRing-debug
        path: bin/*.apk
