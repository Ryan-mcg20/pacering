name: Build PaceRing APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
          libtinfo5 cmake libffi-dev libssl-dev build-essential

    - name: Install Python dependencies
      run: |
        pip install buildozer cython virtualenv

    - name: Set up Android SDK
      run: |
        SDK=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK/cmdline-tools
        cd $SDK/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools latest
        SDKMANAGER=$SDK/cmdline-tools/latest/bin/sdkmanager
        yes | $SDKMANAGER --licenses 2>/dev/null || true
        $SDKMANAGER "platform-tools" "build-tools;33.0.0" "platforms;android-33" "tools"
        mkdir -p $SDK/tools/bin
        cp $SDK/cmdline-tools/latest/bin/sdkmanager $SDK/tools/bin/sdkmanager

    - name: Build APK
      env:
        ANDROIDSDK: /home/runner/.buildozer/android/platform/android-sdk
        ANDROIDNDK: /home/runner/.buildozer/android/platform/android-ndk-r25b
        ANDROIDAPI: "33"
        ANDROIDMINAPI: "26"
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PaceRing-debug
        path: bin/*.apk
